name: Update gas history

on:
  schedule:
    - cron: "0 5 * * *"   # každý den v 5:00 UTC
  workflow_dispatch:        # možnost spustit ručně

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas python-dateutil pyarrow

      - name: Run update script
        run: python scripts/update_gas_history.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history/
          git diff --staged --quiet || git commit -m "data: auto-update gas history $(date +%Y-%m-%d)"
          git push
